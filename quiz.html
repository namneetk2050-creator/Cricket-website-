<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IND vs AUS Quiz</title>
 <link rel="stylesheet" href="style.css" />
 
    <style>
      /* ===== RESET ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      /* ===== NAVBAR ===== */
      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #111;
        padding: 15px 40px;
      }

      .heading {
        color: white;
        font-size: 20px;
      }

      .nav-links {
        list-style: none;
        display: flex;
        gap: 25px;
      }

      .nav-links a {
        text-decoration: none;
        color: white;
        transition: 0.3s;
      }

      .nav-links a:hover {
        color: #00ffcc;
      }

      /* ===== QUIZ SECTION ===== */
      .quiz-section {
        padding: 60px 20px;
        background: #f4f4f4;
        min-height: 100vh;
      }

      .quiz-title {
        text-align: center;
        margin-bottom: 10px;
        font-size: 28px;
      }

      #liveScore {
        text-align: center;
        font-weight: bold;
        font-size: 18px;
        margin-bottom: 40px;
      }

      /* QUESTION CARD */
      .question-card {
        background: white;
        width: 450px;
        margin: 20px auto;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        transition: 0.3s;
      }

      .question-card:hover {
        transform: translateY(-5px);
      }

      /* OPTIONS */
      .option-btn {
        display: block;
        width: 100%;
        margin: 10px 0;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #222;
        color: white;
        cursor: pointer;
        transition: 0.3s;
      }

      .option-btn:hover {
        background: #00bcd4;
      }

      .option-btn:disabled {
        cursor: not-allowed;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <nav>
      <h1 class="heading">Womens multiformat series IND vs AUS</h1>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="jerseycustimisation.html">Personalised Jersey</a></li>
        <li><a href="merchandising.html">Merchandising</a></li>
        <li><a href="game.html">Game</a></li>
        <li><a href="quiz.html">Quiz</a></li>
        <li><a href="highlights.html">Highlights</a></li>
        <li><a href="blog.html">Blog</a></li>
      </ul>
    </nav>
    <!-- QUIZ -->
    <div class="quiz-section">
      <h2 class="quiz-title">Cricket Quiz Challenge 🏏</h2>
      <p id="liveScore">Score: 0 / 10</p>

      <div id="quizContainer"></div>
    </div>

    <script>
      const questions = [
        {
          question: "Who is the captain of India Women's team?",
          options: [
            "Harmanpreet Kaur",
            "Smriti Mandhana",
            "Jhulan Goswami",
            "Mithali Raj",
          ],
          answer: "Harmanpreet Kaur",
        },
        {
          question: "How many players in a cricket team?",
          options: ["9", "10", "11", "12"],
          answer: "11",
        },
        {
          question: "What does LBW stand for?",
          options: [
            "Long Ball Wide",
            "Leg Before Wicket",
            "Left Bat Wide",
            "Leg By Win",
          ],
          answer: "Leg Before Wicket",
        },
        {
          question: "Which country is AUS?",
          options: ["Austria", "Australia", "America", "Argentina"],
          answer: "Australia",
        },
        {
          question: "How many overs in T20?",
          options: ["10", "20", "50", "90"],
          answer: "20",
        },
        {
          question: "How many runs for a six?",
          options: ["4", "5", "6", "7"],
          answer: "6",
        },
        {
          question: "DRS means?",
          options: [
            "Decision Review System",
            "Direct Run Score",
            "Double Run Shot",
            "None",
          ],
          answer: "Decision Review System",
        },
        {
          question: "What color ball in Test?",
          options: ["White", "Pink", "Red", "Blue"],
          answer: "Red",
        },
        {
          question: "Wicketkeeper wears?",
          options: ["Helmet", "Gloves", "Pads only", "Shoes"],
          answer: "Gloves",
        },
        {
          question: "Cricket originated in?",
          options: ["India", "Australia", "England", "USA"],
          answer: "England",
        },
      ];

      let score = 0;
      const quizContainer = document.getElementById("quizContainer");
      const scoreDisplay = document.getElementById("liveScore");

      questions.forEach((q, index) => {
        const card = document.createElement("div");
        card.classList.add("question-card");

        const questionEl = document.createElement("h3");
        questionEl.textContent = index + 1 + ". " + q.question;
        card.appendChild(questionEl);

        q.options.forEach((option) => {
          const button = document.createElement("button");
          button.classList.add("option-btn");
          button.textContent = option;

          button.addEventListener("click", function () {
            if (card.classList.contains("answered")) return;

            card.classList.add("answered");

            if (option === q.answer) {
              button.style.background = "green";
              score++;
            } else {
              button.style.background = "red";
            }

            scoreDisplay.textContent = "Score: " + score + " / 10";

            const allButtons = card.querySelectorAll(".option-btn");
            allButtons.forEach((btn) => (btn.disabled = true));
          });

          card.appendChild(button);
        });

        quizContainer.appendChild(card);
      });
    </script>
    <script src="script.js"></script>
  </body>
</html>
