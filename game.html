<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Decision Review Game</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        background-color: #0f172a;
        color: white;
        font-family: "Poppins", sans-serif;
        overflow-x: hidden;
      }

      /* NAVBAR FIX */
      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 40px;
        background: #020617;
      }

      nav ul {
        display: flex;
        gap: 20px;
        list-style: none;
      }

      nav a {
        color: white;
        text-decoration: none;
      }

      .stadium-border {
        border: 4px solid #fbbf24;
        border-radius: 20px;
        overflow: hidden;
        position: relative;
      }

      .drs-overlay {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(0, 0, 0, 0.8);
        padding: 5px 15px;
        border-radius: 5px;
        color: #fbbf24;
        font-weight: bold;
        border: 1px solid #fbbf24;
        z-index: 10;
      }

      video {
        width: 100%;
        height: 300px;
        object-fit: cover;
        display: block;
      }

      .btn-action {
        transition: 0.2s;
        font-weight: 800;
        padding: 15px 40px;
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <nav>
      <div style="display: flex; align-items: center; gap: 10px">
        <img src="image15.png" width="50" />
        <h1>IND vs AUS</h1>
      </div>

      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="jerseycustimisation.html">Jersey</a></li>
        <li><a href="merchandising.html">Shop</a></li>
        <li><a href="game.html">Game</a></li>
        <li><a href="quiz.html">Quiz</a></li>
        <li><a href="highlights.html">Highlights</a></li>
        <li><a href="blog.html">Blog</a></li>
      </ul>
    </nav>

    <!-- MAIN -->
    <section class="max-w-4xl mx-auto py-12 px-4 text-center">
      <h2 class="text-4xl font-bold mb-6">DRS Simulation</h2>

      <!-- ✅ VIDEO BOX -->
      <div class="stadium-border bg-black mb-8">
        <div class="drs-overlay">DRS LIVE REPLAY</div>

        <video id="myVideo" controls>
          <source src="match.mp4" type="video/mp4" />
          Your browser does not support video.
        </video>
      </div>

      <!-- BUTTONS -->
      <div class="flex justify-center gap-6 mb-8">
        <button id="notout" class="btn-action bg-slate-700">Not Out</button>
        <button id="out" class="btn-action bg-red-600">Out</button>
      </div>

      <div id="ui-feedback">
        <h3 id="result" class="text-3xl font-bold"></h3>
        <p id="scoreText">Score: 0</p>
      </div>
    </section>

    <script>
      const result = document.getElementById("result");
      const scoreText = document.getElementById("scoreText");
      let score = 0;

      document.getElementById("out").onclick = () => {
        result.innerHTML = "✅ CORRECT";
        score++;
        scoreText.innerText = "Score: " + score;
      };

      document.getElementById("notout").onclick = () => {
        result.innerHTML = "❌ WRONG";
      };
      const video = document.getElementById("myVideo");

      video.addEventListener("timeupdate", () => {
        if (video.currentTime >= 11) {
          video.pause();
        }
      });
    </script>
  </body>
</html>
