<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decision Review Game</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0f172a; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
    .stadium-border { border: 4px solid #fbbf24; border-radius: 20px; position: relative; overflow: hidden; }
    .drs-overlay { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 5px; color: #fbbf24; font-weight: bold; font-family: monospace; border: 1px solid #fbbf24; }
    canvas { pointer-events: none; position: fixed; top: 0; left: 0; z-index: 100; }
    .btn-action { transition: all 0.2s; font-weight: 800; text-transform: uppercase; padding: 15px 40px; border-radius: 10px; }
  </style>
</head>
<body>

  <nav class="bg-slate-900 p-4 border-b border-slate-800">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-black text-amber-500">IND vs AUS</h1>
      <ul class="flex space-x-6 text-sm">
        <li><a href="home.html" class="hover:text-amber-500">Home</a></li>
        <li><a href="game.html" class="text-amber-500">Game</a></li>
        <li><a href="merchandising.html">Shop</a></li>
      </ul>
    </div>
  </nav>

  <section class="max-w-4xl mx-auto py-12 px-4 text-center">
    <div class="mb-8">
      <h2 class="text-4xl font-bold mb-2">DRS Simulation</h2>
      <p class="text-slate-400 uppercase tracking-widest text-sm">Watch the replay and make the call</p>
    </div>

    <div class="stadium-border bg-black mb-8">
      <div class="drs-overlay">DRS LIVE REPLAY</div>
      <video class="w-full aspect-video" id="myVideo" poster="https://youtu.be/N2NgBdo-6RA?si=KoS29HrpmhA_-yWH">
        <source src="https://youtu.be/N2NgBdo-6RA?si=KoS29HrpmhA_-yWH" type="video/mp4">
      </video>
    </div>

    <div class="flex justify-center gap-6 mb-8">
      <button id="notout" class="btn-action bg-slate-700 hover:bg-slate-600 border-2 border-slate-500">Not Out</button>
      <button id="out" class="btn-action bg-red-600 hover:bg-red-700 border-2 border-red-500">Out</button>
    </div>

    <div id="ui-feedback" class="h-24">
        <h3 id="result" class="text-3xl font-black mb-2"></h3>
        <p id="scoreText" class="text-amber-500 font-bold text-xl">Score: 0</p>
    </div>
  </section>

  <canvas id="fireworks"></canvas>

  <script>
    const video = document.getElementById("myVideo");
    const result = document.getElementById("result");
    const scoreText = document.getElementById("scoreText");
    const fireworksCanvas = document.getElementById("fireworks");
    let score = 0;

    document.getElementById("out").addEventListener("click", () => {
      result.innerHTML = "<span class='text-green-400'>✅ CORRECT DECISION</span>";
      score++;
      updateScore();
      triggerFireworks();
    });

    document.getElementById("notout").addEventListener("click", () => {
      result.innerHTML = "<span class='text-red-500'>❌ INCORRECT - HITTING STUMPS</span>";
      updateScore();
    });

    function updateScore() {
      scoreText.innerText = "Current Score: " + score;
    }

    // Canvas Logic for Fireworks
    const ctx = fireworksCanvas.getContext("2d");
    function resize() {
      fireworksCanvas.width = window.innerWidth;
      fireworksCanvas.height = window.innerHeight;
    }
    window.onresize = resize;
    resize();

    class Particle {
      constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.velocity = { x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8 };
        this.alpha = 1;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = this.color; ctx.fill();
        ctx.restore();
      }
      update() { this.x += this.velocity.x; this.y += this.velocity.y; this.alpha -= 0.01; }
    }

    function triggerFireworks() {
      let particles = [];
      for (let i = 0; i < 100; i++) {
        particles.push(new Particle(window.innerWidth / 2, window.innerHeight / 2, `hsl(${Math.random()*360},100%,50%)`));
      }
      function animate() {
        if (particles.length === 0) return;
        requestAnimationFrame(animate);
        ctx.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
        particles.forEach((p, i) => {
          p.update(); p.draw();
          if (p.alpha <= 0) particles.splice(i, 1);
        });
      }
      animate();
    }
  </script>
</body>
</html>
