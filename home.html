    <canvas id="fireworks"></canvas>
    <div class="decision-section">
      <div class="video-card">
        <video controls id="myVideo">
          <source src="match.mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>

        <div class="decision-buttons">
          <button id="notout">NOT OUT</button>
          <button id="indialost">OUT</button>
          <h3 id="answer"></h3>
        </div>
      </div>
    </div>
    <!-- <button onclick="document.getElementById('demo').innerHTML = Date()">
      The time is?
    </button>
    <h1 id="demo"></h1> -->
    <script>
      document.getElementById("fireworks").style.display = "none";
      const video = document.getElementById("myVideo");
      const notOutBtn = document.getElementById("notout");
      const outBtn = document.getElementById("indialost");

      // OUT button
      outBtn.addEventListener("click", function () {
        document.getElementById("answer").style.display = "block";
        document.getElementById("answer").innerHTML = "correct";
        document.getElementById("fireworks").style.display = "block";
      });

      // NOT OUT button
      notOutBtn.addEventListener("click", function () {
        document.getElementById("answer").style.display = "block";
        document.getElementById("answer").innerHTML = "incorrect";
      });

      // Stop at 11 seconds
      video.addEventListener("timeupdate", function () {
        if (video.currentTime >= 11) {
          video.pause();
        }
      });
      const canvas = document.getElementById("fireworks");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      class Particle {
        constructor(x, y, color) {
          this.x = x;
          this.y = y;
          this.color = color;
          this.velocity = {
            x: (Math.random() - 0.5) * 8,
            y: (Math.random() - 0.5) * 8,
          };
          this.alpha = 1;
          this.friction = 0.99;
        }

        draw() {
          ctx.globalAlpha = this.alpha;
          ctx.beginPath();
          ctx.arc(this.x, this.y, 2, 0, Math.PI * 2, false);
          ctx.fillStyle = this.color;
          ctx.fill();
        }

        update() {
          this.velocity.x *= this.friction;
          this.velocity.y *= this.friction;
          this.x += this.velocity.x;
          this.y += this.velocity.y;
          this.alpha -= 0.01;
        }
      }

      class Firework {
        constructor(x, y, color) {
          this.x = x;
          this.y = y;
          this.color = color;
          this.velocity = { x: 0, y: Math.random() * -2.5 - 0.5 };
          this.particles = [];
          this.lifespan = 180;
          this.hasExploded = false;
        }

        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, 3, 0, Math.PI * 2, false);
          ctx.fillStyle = this.color;
          ctx.fill();
        }

        explode() {
          for (let i = 0; i < 50; i++) {
            this.particles.push(new Particle(this.x, this.y, this.color));
          }
        }

        update() {
          this.lifespan--;

          if (this.lifespan <= 0 && !this.hasExploded) {
            this.explode();
            this.velocity = { x: 0, y: 0 };
            this.hasExploded = true;
          } else if (this.lifespan > 0) {
            this.y += this.velocity.y;
          }

          for (let i = 0; i < this.particles.length; i++) {
            this.particles[i].update();
            this.particles[i].draw();
          }
        }
      }
      let fireworks = [];

      function animate() {
        requestAnimationFrame(animate);
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        fireworks.forEach((firework, index) => {
          firework.update();
          firework.draw();

          if (
            firework.lifespan <= 0 &&
            firework.particles.every((p) => p.alpha <= 0)
          ) {
            fireworks.splice(index, 1);
          }
        });

        if (Math.random() < 0.015) {
          const x = Math.random() * canvas.width;
          const color = `hsl(${Math.random() * 360}, 50%, 50%)`;
          fireworks.push(new Firework(x, canvas.height, color));
        }
      }

      animate();
    </script>
  </body>
