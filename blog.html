<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cricket Fan Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background-color: #0f172a;
        color: white;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem;
      }
      .post {
        background: #1e293b;
        border: 1px solid #334155;
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 20px;
        animation: slideUp 0.3s ease;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      input,
      textarea {
        width: 100%;
        background: #0f172a;
        border: 1px solid #334155;
        color: white;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 15px;
      }
      input:focus,
      textarea:focus {
        border-color: #fbbf24;
        outline: none;
      }
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 40px;
        background: #020617;
        color: white;
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .nav-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo {
        width: 50px;
        height: 50px;
      }

      .heading {
        font-size: 20px;
        font-weight: bold;
      }

      .nav-links {
        display: flex;
        list-style: none;
        gap: 25px;
      }

      .nav-links li {
        list-style: none;
      }

      .nav-links a {
        text-decoration: none;
        color: white;
        font-weight: 500;
        position: relative;
        transition: 0.3s;
      }

      /* Hover underline animation */
      .nav-links a::after {
        content: "";
        position: absolute;
        width: 0%;
        height: 2px;
        background: #fbbf24;
        left: 0;
        bottom: -5px;
        transition: 0.3s;
      }

      .nav-links a:hover::after {
        width: 100%;
      }

      .nav-links a:hover {
        color: #fbbf24;
      }
    </style>
  </head>
  <body>
    <!-- ================= NAVBAR ================= -->
    <nav class="navbar">
      <div class="nav-left">
        <img src="image15.png" class="logo" />
        <h1 class="heading">IND vs AUS</h1>
      </div>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="jerseycustimisation.html">Jersey</a></li>
        <li><a href="merchandising.html">Shop</a></li>
        <li><a href="game.html">Game</a></li>
        <li><a href="quiz.html">Quiz</a></li>
        <li><a href="highlights.html">Highlights</a></li>
        <li><a href="blog.html">Blog</a></li>
      </ul>
    </nav>

    <!-- ================= BLOG SECTION ================= -->
    <div class="container">
      <div
        class="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-2xl mb-12"
      >
        <h2 class="text-3xl font-bold mb-6 text-amber-500">
          Share Your Match Thoughts
        </h2>
        <input type="text" id="title" placeholder="Post Title" />
        <textarea
          id="content"
          rows="4"
          placeholder="What's on your mind?"
        ></textarea>

        <div class="flex items-center justify-between">
          <input
            type="file"
            id="image"
            accept="image/*"
            class="w-auto border-none p-0 cursor-pointer"
          />
          <button
            class="bg-amber-500 text-slate-950 px-8 py-3 rounded-xl font-bold hover:bg-amber-400 transition"
            onclick="addPost()"
          >
            Publish Post
          </button>
        </div>
      </div>

      <h2
        class="text-2xl font-bold mb-6 uppercase tracking-widest text-slate-400"
      >
        Fan Stream
      </h2>
      <div id="posts"></div>
    </div>

    <script>
      let posts = JSON.parse(localStorage.getItem("posts")) || [];

      function renderPosts() {
        const postsDiv = document.getElementById("posts");
        postsDiv.innerHTML = "";

        if (posts.length === 0) {
          postsDiv.innerHTML =
            "<p class='text-center text-slate-500 italic py-10'>No posts yet. Be the first to share!</p>";
          return;
        }

        posts.forEach((post, index) => {
          const div = document.createElement("div");
          div.className = "post";

          div.innerHTML = `
          <h3 class="text-xl font-bold text-white mb-2">${post.title}</h3>
          <p class="text-slate-300 mb-4 leading-relaxed">${post.content}</p>
          ${post.image ? `<img src="${post.image}" class="w-full h-auto rounded-xl mb-4 border border-slate-700 shadow-lg" />` : ""}
          <div class="flex justify-end">
            <button class="text-red-400 text-sm font-bold uppercase hover:text-red-300" onclick="deletePost(${index})">Delete</button>
          </div>
        `;
          postsDiv.appendChild(div);
        });
      }

      function addPost() {
        const title = document.getElementById("title").value;
        const content = document.getElementById("content").value;
        const imageInput = document.getElementById("image");
        const file = imageInput.files[0];

        if (!title || !content) {
          return; // Silent fail or custom modal here
        }

        if (file) {
          const reader = new FileReader();
          reader.onload = function (e) {
            savePost(title, content, e.target.result);
          };
          reader.readAsDataURL(file);
        } else {
          savePost(title, content, null);
        }
      }

      function savePost(title, content, image) {
        posts.unshift({ title, content, image });
        localStorage.setItem("posts", JSON.stringify(posts));

        document.getElementById("title").value = "";
        document.getElementById("content").value = "";
        document.getElementById("image").value = "";

        renderPosts();
      }

      function deletePost(index) {
        posts.splice(index, 1);
        localStorage.setItem("posts", JSON.stringify(posts));
        renderPosts();
      }

      renderPosts();
    </script>
  </body>
</html>
