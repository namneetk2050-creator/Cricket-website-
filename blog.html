<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cricket Blog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ================= NAVBAR ================= -->
  <nav>
    <h1 class="heading">IND vs AUS</h1>
    <ul class="nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href="jerseycustimisation.html">Jersey</a></li>
      <li><a href="merchandising.html">Shop</a></li>
      <li><a href="game.html">Game</a></li>
      <li><a href="quiz.html">Quiz</a></li>
      <li><a href="highlights.html">Highlights</a></li>
      <li><a href="blog.html">Blog</a></li>
    </ul>
  </nav>

  <!-- ================= BLOG SECTION ================= -->
  <div class="container">

    <h2 style="margin-bottom:20px;">Create New Post</h2>

    <input type="text" id="title" placeholder="Enter title" />
    <textarea id="content" rows="5" placeholder="Write your thoughts..."></textarea>
    <input type="file" id="image" accept="image/*" />

    <button class="btn" onclick="addPost()">Publish</button>

    <h2 style="margin:40px 0 20px;">Latest Posts</h2>

    <div id="posts"></div>

  </div>

  <!-- ================= SCRIPT ================= -->
  <script>
    let posts = JSON.parse(localStorage.getItem("posts")) || [];

    function renderPosts() {
      const postsDiv = document.getElementById("posts");
      postsDiv.innerHTML = "";

      posts.forEach((post, index) => {
        const div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
          <h3>${post.title}</h3>
          <p>${post.content}</p>
          ${post.image ? `<img src="${post.image}" style="width:100%; margin-top:10px; border-radius:10px;"/>` : ""}
          <button style="margin-top:10px; background:red; color:white; padding:8px; border:none; border-radius:6px; cursor:pointer;" onclick="deletePost(${index})">Delete</button>
        `;

        postsDiv.appendChild(div);
      });
    }

    function addPost() {
      const title = document.getElementById("title").value;
      const content = document.getElementById("content").value;
      const imageInput = document.getElementById("image");
      const file = imageInput.files[0];

      if (!title || !content) {
        alert("Fill all fields");
        return;
      }

      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          savePost(title, content, e.target.result);
        };
        reader.readAsDataURL(file);
      } else {
        savePost(title, content, null);
      }
    }

    function savePost(title, content, image) {
      posts.unshift({ title, content, image });
      localStorage.setItem("posts", JSON.stringify(posts));

      document.getElementById("title").value = "";
      document.getElementById("content").value = "";
      document.getElementById("image").value = "";

      renderPosts();
    }

    function deletePost(index) {
      posts.splice(index, 1);
      localStorage.setItem("posts", JSON.stringify(posts));
      renderPosts();
    }

    renderPosts();
  </script>

</body>
</html>
